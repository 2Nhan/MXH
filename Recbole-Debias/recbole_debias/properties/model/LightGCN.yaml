# LightGCN configuration for fair comparison in Recbole-Debias

# Architecture parameters
embedding_size: 64      # (int) The embedding size of users and items.
n_layers: 2             # (int) The number of layers in LightGCN.
reg_weight: 1e-05       # (float) The L2 regularization weight.

# Training parameters synchronized for Fairness (as specified in ml.md)
learning_rate: 0.005    # Set to match MF's best config or baseline range
train_batch_size: 2048  # Set to match MF's best config
